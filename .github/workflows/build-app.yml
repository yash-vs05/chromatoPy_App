name: Build desktop apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact_name: chromatoPy-desktop-macos-apple-silicon
            archive_name: chromatoPy-desktop-macos-apple-silicon.dmg
            shell: bash

          - os: windows-latest
            artifact_name: chromatoPy-desktop-windows
            archive_name: chromatoPy-desktop-windows.zip
            shell: pwsh

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Create environment
        run: uv venv .venv --python 3.11

      - name: Install package and build dependencies
        run: |
          uv pip install -e .
          uv pip install pyinstaller

      - name: Verify Qt binding
        run: |
          uv run python -c "import PySide6; print('PySide6 OK')"

      - name: Verify PyQt5 is absent
        run: |
          uv run python -c "import importlib.util, sys; sys.exit(1 if importlib.util.find_spec('PyQt5') else 0)"

      - name: Build app
        run: uv run python build_app.py

      - name: Package macOS app as DMG
        if: runner.os == 'macOS'
        run: |
          hdiutil create \
            -volname "chromatoPy" \
            -srcfolder "build/dist/chromatoPy-desktop.app" \
            -ov \
            -format UDZO \
            "${{ matrix.archive_name }}"

      - name: Package Windows app
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path build/dist/chromatoPy-desktop -DestinationPath ${{ matrix.archive_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_name }}

      - name: Upload build to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive_name }}
